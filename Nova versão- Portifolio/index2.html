<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta 
    name="description" 
    content="Projetos de Kauã Restoff - Portfólio de desenvolvimento web, sistemas e interfaces."
  />

  <meta name="author" content="Kauã Restoff de Oliveira" />

  <title>Restoff | Projetos</title>

  <link 
    rel="icon" 
    type="image/svg+xml" 
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238c5cff'/%3E%3Cstop offset='100%25' stop-color='%23a579ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='70' font-weight='bold' font-family='Arial, sans-serif' fill='url(%23grad)'%3EKR%3C/text%3E%3C/svg%3E"
  />

  <link 
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" 
    rel="stylesheet"
  />

  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition:
        background-color 0.3s ease,
        color 0.3s ease,
        border-color 0.3s ease,
        box-shadow 0.3s ease,
        transform 0.2s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Outfit", sans-serif;
      line-height: 1.7;
      background: var(--fundo);
      color: var(--texto);
      overflow-x: hidden;
    }

    :root,
    body.theme-light {
      --fundo: #eceaf4;
      --texto: #11111a;
      --texto-sec: #555463;
      --titulo: #080817;
      --destaque: #6d3bff;
      --destaque-hover: #8c5cff;
      --destaque-soft: rgba(109, 59, 255, 0.14);
      --borda: rgba(20, 18, 35, 0.12);
      --card-bg: rgba(255, 255, 255, 0.48);
      --vidro: rgba(255, 255, 255, 0.68);
      --glass-border: rgba(255, 255, 255, 0.55);
      --glass-shadow: rgba(58, 40, 110, 0.18);
      --glow: rgba(109, 59, 255, 0.28);
      --terminal-bg: rgba(248, 246, 255, 0.74);
      --terminal-screen: rgba(255, 255, 255, 0.76);
      --terminal-top: rgba(255, 255, 255, 0.78);
      --terminal-muted: #746b8f;
      --btn-demo-color: #11111a;
    }

    body.theme-dark-blue {
      --fundo: #061226;
      --texto: #e8e8e8;
      --texto-sec: #bac6d8;
      --titulo: #f7f9fc;
      --destaque: #8c5cff;
      --destaque-hover: #a579ff;
      --destaque-soft: rgba(140, 92, 255, 0.14);
      --borda: rgba(255, 255, 255, 0.06);
      --card-bg: rgba(255, 255, 255, 0.055);
      --vidro: rgba(12, 20, 36, 0.58);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.35);
      --glow: rgba(140, 92, 255, 0.35);
      --terminal-bg: rgba(22, 19, 31, 0.78);
      --terminal-screen: rgba(13, 17, 26, 0.82);
      --terminal-top: rgba(255, 255, 255, 0.055);
      --terminal-muted: #7d8597;
      --btn-demo-color: #ffffff;
    }

    body.theme-dark-black {
      --fundo: #090909;
      --texto: #e8e8e8;
      --texto-sec: #c6c6c6;
      --titulo: #fafafa;
      --destaque: #8c5cff;
      --destaque-hover: #a579ff;
      --destaque-soft: rgba(140, 92, 255, 0.14);
      --borda: rgba(255, 255, 255, 0.06);
      --card-bg: rgba(255, 255, 255, 0.045);
      --vidro: rgba(15, 15, 18, 0.58);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-shadow: rgba(0, 0, 0, 0.45);
      --glow: rgba(140, 92, 255, 0.35);
      --terminal-bg: rgba(22, 19, 31, 0.78);
      --terminal-screen: rgba(11, 13, 19, 0.84);
      --terminal-top: rgba(255, 255, 255, 0.055);
      --terminal-muted: #7d8597;
      --btn-demo-color: #ffffff;
    }

    body {
      background:
        radial-gradient(circle at 12% 20%, rgba(140, 92, 255, 0.20), transparent 32%),
        radial-gradient(circle at 86% 28%, rgba(140, 92, 255, 0.12), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(23, 133, 130, 0.10), transparent 35%),
        var(--fundo);
    }

    .container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .text-accent {
      color: var(--destaque);
    }

    .floating-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.22;
      animation: floatRing 18s infinite ease-in-out;
    }

    @keyframes floatRing {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
      100% { transform: translate(-20px, 20px) scale(1); }
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 1rem 0;
      transition: 0.25s ease;
    }

    header.scrolled {
      background: var(--vidro);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 12px 30px var(--glass-shadow);
    }

    .navbar {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--destaque), var(--titulo));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      cursor: pointer;
      user-select: none;
      letter-spacing: -0.04em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      list-style: none;
      margin: 0 auto;
    }

    .nav-links a {
      color: var(--texto);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--destaque);
    }

    .nav-links a.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: var(--destaque);
      box-shadow: 0 0 14px var(--destaque);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .theme-toggle,
    .lang-toggle {
      background: var(--card-bg);
      color: var(--texto);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 10px 24px var(--glass-shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .theme-toggle:hover,
    .lang-toggle:hover {
      border-color: var(--destaque);
      transform: translateY(-2px);
    }

    .menu-toggle {
      display: none;
      background: transparent;
      border: none;
      color: var(--texto);
      font-size: 1.8rem;
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.78rem 1.45rem;
      border-radius: 9999px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      font-size: 0.95rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--destaque), var(--destaque-hover));
      color: #ffffff;
      box-shadow:
        0 12px 26px rgba(140, 92, 255, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow:
        0 16px 34px rgba(140, 92, 255, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(140, 92, 255, 0.35);
      color: var(--btn-demo-color);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 10px 22px var(--glass-shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .btn-secondary:hover {
      background: var(--destaque);
      border-color: var(--destaque);
      color: #ffffff;
      transform: translateY(-2px);
    }

    main {
      position: relative;
      z-index: 1;
    }

    .projects-section {
      min-height: 100vh;
      padding: 8rem 0 5rem;
      border-top: 1px solid var(--borda);
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-header h1 {
      font-size: clamp(2.6rem, 7vw, 4.4rem);
      color: var(--titulo);
      line-height: 0.98;
      margin-bottom: 1rem;
      letter-spacing: -0.06em;
      font-weight: 900;
    }

    .section-header p {
      color: var(--texto-sec);
      max-width: 760px;
      margin: 0 auto;
      font-size: 1.02rem;
    }

    .project-filters {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin: 1.65rem auto 0;
    }

    .filter-btn {
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.045);
      color: var(--texto-sec);
      padding: 0.55rem 0.95rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.86rem;
      font-weight: 750;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: #ffffff;
      border-color: rgba(140, 92, 255, 0.48);
      background: linear-gradient(135deg, var(--destaque), var(--destaque-hover));
      box-shadow:
        0 10px 24px rgba(140, 92, 255, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .projetos-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1.15rem;
      perspective: 1400px;
    }


    .empty-projects {
      grid-column: 1 / -1;
      padding: 2rem;
      border-radius: 1.25rem;
      text-align: center;
      color: var(--texto-sec);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 14px 34px var(--glass-shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.10);
    }

    .empty-projects strong {
      color: var(--destaque);
    }

    .projeto-card {
      position: relative;
      min-height: 410px;
      cursor: pointer;
      transform-style: preserve-3d;
    }

    .projeto-card::before {
      content: "";
      position: absolute;
      inset: 16px 16px -10px;
      border-radius: 1.32rem;
      background: rgba(0, 0, 0, 0.26);
      filter: blur(14px);
      opacity: 0.42;
      z-index: 0;
    }

    .projeto-card:hover::before {
      opacity: 0.48;
      transform: translateY(2px);
    }

    .project-terminal {
      position: relative;
      z-index: 1;
      min-height: 410px;
      height: 100%;
      border-radius: 1.22rem;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.028)),
        var(--terminal-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 14px 34px var(--glass-shadow),
        0 2px 6px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.10);
      display: flex;
      flex-direction: column;
      transform-style: preserve-3d;
    }

    .projeto-card:hover .project-terminal {
      transform: translateY(-1.5px);
      border-color: rgba(140, 92, 255, 0.24);
      box-shadow:
        0 16px 38px rgba(0, 0, 0, 0.28),
        0 0 16px rgba(140, 92, 255, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .project-terminal::after {
      display: none;
    }

    .terminal-top {
      min-height: 32px;
      padding: 0.32rem 0.68rem;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(0, 0, 0, 0.045)),
        var(--terminal-top);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.55rem;
    }

    .terminal-dots {
      display: flex;
      align-items: center;
      gap: 0.28rem;
    }

    .terminal-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: block;
      opacity: 0.85;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.32);
    }

    .terminal-dots span:nth-child(1) { background: #ff5f57; }
    .terminal-dots span:nth-child(2) { background: #febc2e; }
    .terminal-dots span:nth-child(3) { background: #28c840; }

    .terminal-title {
      color: var(--terminal-muted);
      font-size: 0.65rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.85;
    }

    .terminal-icon {
      color: var(--terminal-muted);
      font-size: 0.72rem;
      opacity: 0.75;
    }

    .project-image-wrap {
      margin: 0.82rem 0.82rem 0;
      height: 145px;
      border-radius: 0.95rem;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(140, 92, 255, 0.12), transparent 45%),
        rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.085);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .project-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 0.35rem;
      display: block;
    }

    .terminal-body {
      flex: 1;
      padding: 0.85rem;
      color: var(--texto);
      display: flex;
      flex-direction: column;
    }

    .project-title {
      color: var(--titulo);
      font-size: 1.22rem;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -0.035em;
      margin-bottom: 0.45rem;
    }

    .project-tech {
      color: var(--destaque);
      font-size: 0.82rem;
      font-weight: 800;
      margin-bottom: 0.55rem;
    }

    .project-desc {
      color: var(--texto-sec);
      font-size: 0.88rem;
      line-height: 1.48;
      margin-bottom: 0.75rem;
    }

    .terminal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding-top: 0.62rem;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.052);
      color: var(--terminal-muted);
      font-size: 0.75rem;
      font-weight: 800;
    }

    .terminal-open {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--destaque);
    }

    .terminal-index {
      min-width: 29px;
      height: 29px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: linear-gradient(135deg, var(--destaque), var(--destaque-hover));
      box-shadow:
        0 8px 18px rgba(140, 92, 255, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.20);
    }

    .mobile-expanded {
      display: none;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .mobile-buttons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(140, 92, 255, 0.20), transparent 35%),
        rgba(2, 5, 12, 0.90);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-terminal {
      width: min(940px, 100%);
      max-height: 92vh;
      border-radius: 1.45rem;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.03)),
        var(--terminal-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow:
        0 28px 78px rgba(0, 0, 0, 0.50),
        0 0 38px rgba(140, 92, 255, 0.13),
        inset 0 1px 0 rgba(255, 255, 255, 0.13);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .modal-terminal .terminal-top {
      padding: 0.38rem 0.75rem;
      min-height: 34px;
    }

    .close-modal {
      background: transparent;
      border: none;
      color: var(--terminal-muted);
      font-size: 1.1rem;
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .close-modal:hover {
      background: var(--destaque);
      color: #ffffff;
      transform: scale(1.03);
    }

    .modal-content-body {
      overflow: auto;
      padding: 1.2rem;
      background:
        radial-gradient(circle at top left, rgba(140, 92, 255, 0.10), transparent 40%),
        var(--terminal-screen);
    }

    .modal-preview {
      width: 100%;
      height: 340px;
      border-radius: 1.15rem;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(140, 92, 255, 0.14), transparent 45%),
        rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.085);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.4rem;
    }

    .modal-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 0.7rem;
      display: block;
    }

    .modal-info {
      text-align: left;
      max-width: 860px;
      margin: 0;
    }

    .modal-title {
      color: var(--titulo);
      font-size: clamp(1.8rem, 4vw, 2.65rem);
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 900;
      margin-bottom: 0.65rem;
    }

    .modal-tech {
      color: var(--destaque);
      font-weight: 900;
      font-size: 0.98rem;
      margin-bottom: 0.95rem;
    }

    .modal-desc {
      color: var(--texto-sec);
      font-size: 1rem;
      line-height: 1.65;
      margin-bottom: 1.3rem;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .projetos-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 920px) {
      .projetos-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .menu-toggle {
        display: block;
      }

      .nav-links {
        position: fixed;
        top: 70px;
        left: -100%;
        width: 72%;
        height: calc(100vh - 70px);
        background: var(--vidro);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 2rem;
        gap: 1.8rem;
        border-right: 1px solid var(--glass-border);
        z-index: 99;
        transition: left 0.3s ease;
      }

      .nav-links.active {
        left: 0;
      }

      .header-actions {
        gap: 0.5rem;
      }

      .theme-toggle span {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 1rem;
      }

      .projects-section {
        padding: 6.5rem 0 3rem;
      }

      .section-header h1 {
        font-size: 2.5rem;
      }

      .section-header p {
        font-size: 0.95rem;
      }

      .projetos-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .projeto-card,

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getProjectTags(proj) {
      const tags = new Set();
      const tech = proj.tech.toLowerCase();
      const slug = proj.slug.toLowerCase();

      if (tech.includes("html") || tech.includes("css")) tags.add("html_css");
      if (tech.includes("javascript") || tech.includes("js")) tags.add("javascript");
      if (tech.includes("php")) tags.add("php");
      if (tech.includes("react")) tags.add("react");
      if (tech.includes("python")) tags.add("python");
      if (tech.includes("typescript") || tech.includes("ts")) tags.add("typescript");
      if (tech.includes("mysql") || tech.includes("sql")) tags.add("mysql");

      if (slug === "digital_showcase") {
        tags.add("react");
        tags.add("php");
        tags.add("mysql");
        tags.add("javascript");
        tags.add("html_css");
      }

      return Array.from(tags);
    }

    function updateFilterButtons() {
      document.querySelectorAll(".filter-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === currentFilter);
      });
    }

    function renderProjects() {
      const grid = document.getElementById("projetosGrid");
      if (!grid) return;

      grid.innerHTML = "";

      const visibleProjects = currentProjects.filter((proj) => {
        if (currentFilter === "all") return true;
        return getProjectTags(proj).includes(currentFilter);
      });

      if (visibleProjects.length === 0) {
        const activeLabel = document.querySelector(`.filter-btn[data-filter="${currentFilter}"]`)?.innerText || currentFilter;
        grid.innerHTML = `
          <div class="empty-projects">
            <strong>${escapeHtml(activeLabel)}</strong><br>
            ${currentLang === "pt" ? "Nenhum projeto cadastrado com essa tecnologia ainda." : "No project registered with this technology yet."}
          </div>
        `;
        return;
      }

        const card = document.createElement("div");
        card.className = "projeto-card";

        const imgSrc = proj.image || `https://placehold.co/800x450/8c5cff/white?text=${encodeURIComponent(proj.title)}`;
        const shortDesc = proj.desc.length > 95 ? `${proj.desc.substring(0, 95)}...` : proj.desc;

        card.innerHTML = `

              <div class="terminal-dots">
                <span></span>
                <span></span>
                <span></span>
              </div>

                loading="lazy"
                onerror="this.src='https://placehold.co/800x450/8c5cff/white?text=${encodeURIComponent(proj.title)}'"

            </div>

            <div class="terminal-body">
              <h3 class="project-title">${escapeHtml(proj.title)}</h3>
              <p class="project-tech">${escapeHtml(proj.tech)}</p>
              <p class="project-desc">${escapeHtml(shortDesc)}</p>

              <div class="mobile-expanded">
                <p class="project-desc">${escapeHtml(proj.desc)}</p>

                <div class="mobile-buttons">
                  <a 
                    href="${proj.github}" 
                    target="_blank" 
                    rel="noopener noreferrer" 
                    class="btn btn-primary"
                  >
                    <i class="fab fa-github"></i>
                    GitHub
                  </a>

                  ${
                    proj.demo && proj.demo !== ""
                      ? `

                          href="${proj.demo}" 
                          target="_blank" 
                          rel="noopener noreferrer" 
                          class="btn btn-secondary"

    function openModal(proj) {
      const imgSrc = proj.image || `https://placehold.co/1000x600/8c5cff/white?text=${encodeURIComponent(proj.title)}`;

      document.getElementById("modalImg").src = imgSrc;
      document.getElementById("modalTitle").innerText = proj.title;

      document.getElementById("modalDesc").innerText = proj.desc;
      document.getElementById("modalLink").href = proj.github;
      document.getElementById("modalTerminalTitle").innerText = `${proj.slug}.preview`;

      const demoLink = document.getElementById("modalDemoLink");

      if (proj.demo && proj.demo !== "") {
        demoLink.href = proj.demo;
        demoLink.style.display = "inline-flex";
      } else {
        demoLink.style.display = "none";
      }

      document.getElementById("projectModal").style.display = "flex";
      document.body.style.overflow = "hidden";
    }

      document.getElementById("projectModal").style.display = "none";
      document.body.style.overflow = "";

      if (event.target === modal) {
        closeModal();

      document.body.classList.remove(

        "theme-dark-blue",

      document.body.classList.add(`theme-${theme}`);

      const icon = themeToggle.querySelector("i");
      icon.className = `fas ${themeIcons[theme]}`;

      currentTheme = theme;
      localStorage.setItem("portfolio-theme", theme);
    }

    themeToggle.addEventListener("click", () => {
      const currentIndex = themes.indexOf(currentTheme);
      const nextTheme = themes[(currentIndex + 1) % themes.length];

      setTheme(nextTheme);

        header.classList.remove("scrolled");
      }

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
          }
        });
      },
      {
        threshold: 0.1
      }
    );

    fadeElements.forEach((element) => observer.observe(element));

      floatingBg.innerHTML = "";

      const gradients = [
        "linear-gradient(135deg, #8c5cff, #150c2f)",
        "linear-gradient(135deg, #0A1828, #8c5cff)",
        "linear-gradient(135deg, #8c5cff, #4e2acb)"
      ];

      for (let i = 0; i < 3; i++) {
        const ring = document.createElement("div");

        ring.className = "ring";

        const size = 300 + Math.random() * 200;

        ring.style.width = `${size}px`;
        ring.style.height = `${size}px`;
        ring.style.background = gradients[i % gradients.length];
        ring.style.left = `${Math.random() * 100}%`;
        ring.style.top = `${Math.random() * 100}%`;
        ring.style.animationDelay = `${i * 2}s`;

        floatingBg.appendChild(ring);
      }
    }

    setTheme(currentTheme);
    applyLanguage(currentLang);
    createRings();
  </script>

</body>
</html>
